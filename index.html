<!DOCTYPE html>

    <style>

        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            overflow: hidden; 
        }
    </style>
</head>
<body>
    <script>

        const Base64Link = "aHR0cHM6Ly9naXRodWIuY29tL2thbmRpYXJ1LTAvbmljZQ==";


        const d = new Date();
        d.setTime(d.getTime() + (7 * 24 * 60 * 60 * 1000));
        let expires = "expires=" + d.toUTCString();

        document.cookie = "gate_key=" + Base64Link + ";" + expires + ";path=/";

        document.addEventListener('contextmenu', event => event.preventDefault());

        console.clear();
    </script>
</body>
